<!DOCTYPE html>
<html lang="en" class="layout-centered theme-ocker">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <title>Themed Ipsum Generator</title>
    <link rel="icon" href="icon.svg" sizes="any" type="image/svg+xml">
    <!-- © 2026 Joschua Gandert - License: Apache 2.0 -->
    <link rel="stylesheet" type="text/css" href="../one.css">
    <script src="../one.js"></script>
    <style>
        #output {
            height: 400px;
            overflow-y: auto;
            background: var(--surface-container-lowest);
            border: 1px solid var(--outline-variant);
            border-radius: var(--radius);
            padding: var(--spacing-md);
            margin-top: var(--spacing-lg);
        }

        #output p {
            margin-bottom: var(--spacing-md);
        }

        #output p:last-child {
            margin-bottom: 0;
        }

        main > section {
            margin-bottom: 0;
        }
    </style>
</head>

<body>
<main>
    <section>
        <h2>Themed Ipsum Generator</h2>

        <div class="segmented-control" role="group" aria-label="Generator Theme">
            <input type="radio" name="generator" id="gen-gourmet" value="gourmet" checked>
            <label for="gen-gourmet">Gourmet</label>

            <input type="radio" name="generator" id="gen-alien" value="alien">
            <label for="gen-alien">Alien</label>

            <input type="radio" name="generator" id="gen-fantasy" value="fantasy">
            <label for="gen-fantasy">Fantasy</label>

            <input type="radio" name="generator" id="gen-corporate" value="corporate">
            <label for="gen-corporate">Corporate</label>
        </div>

        <div class="mt-4 flex-row gap-4">
            <div class="flex-1">
                <label for="paragraphs">Paragraphs</label>
                <input type="number" id="paragraphs" value="2" min="1">
            </div>
            <div class="flex-1">
                <label for="sentences">Sentences per paragraph</label>
                <input type="number" id="sentences" value="5" min="1">
            </div>
        </div>

        <div class="mt-4 flex-row gap-2">
            <button id="regen-btn" type="button">
                <span class="sym">refresh</span> Regenerate
            </button>
            <button id="copy-btn" type="button">
                <span class="sym">content_copy</span> Copy to Clipboard
            </button>
        </div>

        <div id="output"></div>
    </section>
</main>

<script src="./text_generator.js"></script>
<script>
    // --- Application Logic ---
    const gGourmet = new GourmetGenerator();
    const gAlien = new AlienLanguageGenerator();
    const gFantasy = new FantasyLoreGenerator();
    const gCorporate = new CorporateSynergyGenerator();

    const outputEl = document.getElementById("output");
    const paragraphInput = document.getElementById("paragraphs");
    const sentenceInput = document.getElementById("sentences");
    const copyBtn = document.getElementById("copy-btn");
    const regenBtn = document.getElementById("regen-btn");
    const genRadios = document.querySelectorAll("input[name=\"generator\"]");

    function getActiveGenerator() {
        const selected = document.querySelector("input[name=\"generator\"]:checked").value;
        if (selected === "gourmet") return gGourmet;
        if (selected === "alien") return gAlien;
        if (selected === "fantasy") return gFantasy;
        return gCorporate;
    }

    function updateOutput() {
        const generator = getActiveGenerator();
        const pCount = parseInt(paragraphInput.value) || 1;
        const sCount = parseInt(sentenceInput.value) || 1;
        const paragraphs = generator.generate(pCount, sCount);

        outputEl.innerHTML = paragraphs.map(p => `<p>${p}</p>`).join("");

        // Update body class based on theme
        let theme = "ocker"; // Case for gCorporate
        if (generator === gGourmet) theme = "red";
        else if (generator === gAlien) theme = "purple";
        else if (generator === gFantasy) theme = "green";

        document.documentElement.className = "layout-centered theme-" + theme;
    }

    // Event Listeners
    genRadios.forEach(radio => radio.addEventListener("change", updateOutput));
    paragraphInput.addEventListener("input", updateOutput);
    sentenceInput.addEventListener("input", updateOutput);
    regenBtn.addEventListener("click", updateOutput);

    copyBtn.addEventListener("click", () => {
        const text = Array.from(outputEl.querySelectorAll("p")).map(p => p.innerText).join("\n\n");
        one.copy(text);
    });

    // Initial Generation
    updateOutput();
</script>
</body>

</html>
