<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <meta name="description"
          content="Interactive web-based live-coding playground and synthesizer for Motif.js.">
    <title>Motif Live Coder</title>
    <link rel="icon" href="icon.svg" sizes="any" type="image/svg+xml">
    <!-- © 2026 Joschua Gandert - License: Apache 2.0 -->
    <link rel="stylesheet" type="text/css" href="../one.css">
    <script src="../storage.js"></script>
    <style>
        main {
            display: flex;
            flex-direction: column;
            height: calc(100vh - var(--header-height));
            box-sizing: border-box;
            gap: var(--spacing-md);
            padding: var(--spacing-md);
        }

        aside {
            height: calc(100vh - var(--header-height));
            box-sizing: border-box;
            overflow-y: auto;
        }

        @media (min-width: 900px) {
            aside {
                position: sticky;
                top: var(--header-height);
            }
        }

        .editor-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        #code-editor {
            flex-grow: 1;
            font-family: var(--font-code);
            font-size: 0.95rem;
            line-height: 1.5;
            resize: none;
            margin-bottom: 0;
            border-radius: var(--radius);
            border: 1px solid var(--outline-variant);
            padding: var(--spacing-md);
            background-color: var(--surface-container-highest);
            color: var(--on-surface);
        }

        #logs-panel {
            background: var(--surface-container-low);
            border: 1px solid var(--outline-variant);
            border-radius: var(--radius);
            padding: var(--spacing-sm) var(--spacing-md);
            height: 350px;
            overflow-y: auto;
            margin-top: var(--spacing-md);
        }

        #logs-panel pre {
            margin: 0;
            background: transparent;
            color: var(--on-surface-variant);
            font-family: var(--font-code);
            font-size: 0.85rem;
            white-space: pre-wrap;
        }

        .log-info {
            color: var(--on-surface-variant);
        }

        .log-success {
            color: var(--primary);
            font-weight: 500;
        }

        .log-error {
            color: var(--error);
            font-weight: 600;
        }

        .log-warn {
            color: var(--secondary);
            font-weight: 500;
        }

        .log-default {
            color: var(--on-surface);
        }

        .btn-sym.recording {
            color: var(--error) !important;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
            }
            50% {
                opacity: 0.4;
            }
            100% {
                opacity: 1;
            }
        }
        #playback-hud {
            background-color: var(--surface-container-low);
            border: 1px solid var(--outline-variant);
            border-radius: var(--radius);
            padding: var(--spacing-md);
            display: flex;
            flex-direction: column;
            gap: var(--spacing-sm);
        }

        #playback-stats {
            display: flex;
            justify-content: space-between;
            font-weight: 500;
            color: var(--on-surface-variant);
        }

        #playback-instruments {
            color: var(--on-surface-variant);
            opacity: 0.8;
            font-size: 0.8em;
            display: flex;
            justify-content: space-between;
        }

        #active-samples-list {
            text-align: right;
        }

        #playback-instruments span:not(:empty) {
            background-color: var(--surface-container-high);
            padding: 2px 6px;
            border-radius: 4px;
        }

        #playback-progress {
            width: 100%;
            height: 6px;
            border-radius: 3px;
        }

        #playback-progress::-webkit-progress-bar {
            background-color: var(--surface-container-highest);
            border-radius: 3px;
        }
        #playback-progress::-webkit-progress-value {
            background-color: var(--primary);
            border-radius: 3px;
        }
        #playback-progress::-moz-progress-bar {
            background-color: var(--primary);
            border-radius: 3px;
        }
    </style>
</head>

<body>
<input type="checkbox" id="aside-state" class="aside-state-toggle" hidden aria-hidden="true">

<header>
    <label for="aside-state" class="aside-toggle-btn" aria-label="Toggle settings"></label>
    <hgroup>
        <h1>Motif Live Coder</h1>
        <p>Interactive algorithmic synth playground</p>
    </hgroup>

    <nav aria-label="Controls">
        <ul>
            <li>
                <button type="button" class="btn-sym" id="play-pause-btn"
                        data-tooltip="Play / Pause">play_arrow
                </button>
            </li>
            <li>
                <button type="button" class="btn-sym" id="restart-btn"
                        data-tooltip="Restart Playback">replay
                </button>
            </li>
            <li>
                <button type="button" class="btn-sym" id="download-btn"
                        data-tooltip="Record & Download WAV">download
                </button>
            </li>
        </ul>
    </nav>
</header>

<aside>
    <h2>Settings &amp; Compositions</h2>

    <form id="settings-form" onsubmit="event.preventDefault();">
        <fieldset>
            <legend>Compositions</legend>
            <select id="preset-select" name="preset-select" aria-label="Presets"><option value="Default">Showcase (builtin)</option></select>
            <div class="input-row">
                <button type="button" class="btn-sym" id="add-preset-btn" data-tooltip="New Composition">
                    add
                </button>
                <button type="button" class="btn-sym" id="paste-preset-btn" data-tooltip="Paste Composition">
                    content_paste
                </button>
                <button type="button" class="btn-sym" id="edit-preset-btn" data-tooltip="Edit Composition Name" disabled>
                    edit
                </button>
                <button type="button" class="btn-sym btn-danger" id="delete-preset-btn" data-tooltip="Delete Composition" disabled>delete
                </button>
                <button type="button" class="btn-sym" id="download-preset-btn" data-tooltip="Download Composition JS">download
                </button>
            </div>
            <div class="mt-1">
                <small id="preset-datetime-display" class="timestamp"></small>
            </div>
        </fieldset>

        <fieldset>
            <legend>Data</legend>
            <div class="input-row">
                <button type="button" id="export-btn">
                    <span class="sym">save</span>
                    Export
                </button>
                <button type="button" id="import-btn">
                    <span class="sym">folder_open</span>
                    Import
                </button>
            </div>
            <input type="file" id="import-file" accept=".json" hidden aria-hidden="true">
        </fieldset>

        <fieldset>
            <legend>Theme Color</legend>
            <label for="color-selector">
                Color Theme
                <select id="color-selector">
                    <option value="" selected>Default (Purple-Green)</option>
                    <option value="blue">Blue</option>
                    <option value="green">Green</option>
                    <option value="turquoise">Turquoise</option>
                    <option value="ocker">Ocker</option>
                    <option value="orange">Orange</option>
                    <option value="pink">Pink</option>
                    <option value="purple">Purple</option>
                    <option value="red">Red</option>
                </select>
            </label>
        </fieldset>
    </form>

    <details open id="logs-details">
        <summary>Engine Output & Console Logs</summary>
        <div id="logs-panel">
            <pre id="console-logs"><code class="log-info">[System] Ready. Press play_arrow to start playing!
</code></pre>
        </div>
    </details>
</aside>

<main id="content">
    <div id="playback-hud" hidden>
        <div id="playback-stats">
            <span id="playback-time">Bar 1 | Time: 0:00</span>
            <span id="playback-section"></span>
        </div>
        <div id="playback-instruments">
            <span id="active-synths-list"></span>
            <span id="active-samples-list"></span>
        </div>
        <progress id="playback-progress" value="0" max="100"></progress>
    </div>
    <div class="editor-container">
        <!-- prettier-ignore-start -->
        <!-- beautify ignore:start -->
        <textarea id="code-editor" autocomplete="off" spellcheck="false"
                  aria-label="Motif Code Editor">// Motif Live Coding Playground
//
// Motif is a declarative JavaScript music engine. 
// Standard arrays are played sequentially; nest them to subdivide beats.
// Parallel() triggers notes at the same time.
// Ramp() generates continuous parameter slides.
// LFO modulates parameters reactively.
//
// Features showcased:
// - Generative pure synths (ambient-bell, fm-epiano, soft-square, sub-bass)
// - Diatonic scale mapping (.scale)
// - Advanced voice-leading (.chordVoicing)
// - Algorithmic counterpoint / echo (.offset)
// - Conditional note mutation (.mask)
// - Deterministic Euclidean rhythms (.euclid)
// - An extended 3x longer multi-phase arrangement (96 bars)
//
// -----------------------------------------------------------------------------
// Global Setup
// -----------------------------------------------------------------------------
Motif.setTempo(165); // Fast, but clean and breathable

Motif.master({
    gain: 0.85,
    limiter: true,
    eq: { low: 1.05, mid: 0.95, high: 1.10 }, // Clean, hi-fi EQ
});

// -----------------------------------------------------------------------------
// Global FX Routing
// -----------------------------------------------------------------------------
// A pristine, wide delay without messy feedback to maintain laboratory cleanliness
const echoBus = Bus("echoBus")
    .filter({ type: "bandpass", cutoff: 2000, resonance: 1.2 })
    .pan(LFO.sine({ min: -0.7, max: 0.7, speed: "2b" }))
    .volume(-5);

// -----------------------------------------------------------------------------
// Track Definitions
// -----------------------------------------------------------------------------

// --- MELODIC & ATMOSPHERIC ---

// Ambient Bell: The core harmonic progression (Cmaj7 -> Fmaj7 -> Am7 -> G)
const bell = Track("bell")
    .synth("ambient-bell")
    .note([
        Parallel("C4", "E4", "G4", "B4"),
        Parallel("F3", "A3", "C4", "E4"),
        Parallel("A3", "C4", "E4", "G4"),
        Parallel("G3", "B3", "D4", "G4")
    ])
    .loopLength("4b") // Each chord holds for exactly 1 bar
    .chordVoicing({ mode: "smooth" }) // Algorithmic voice leading
    .envelope({ attack: 0.05, decay: 1.5, sustain: 0.2, release: 2.0 })
    .gain(0.45)
    .send(echoBus, 0.4);

// Drone Pad: Warm, analog-style backing layer
const dronePad = Track("dronePad")
    .synth("ambient-pad")
    .voices(4)
    .note([
        Parallel("C3", "G3", "C4", "E4"),
        Parallel("F2", "C3", "F3", "A3"),
        Parallel("A2", "E3", "A3", "C4"),
        Parallel("G2", "D3", "G3", "B3")
    ])
    .loopLength("4b")
    .envelope({ attack: 1.0, decay: 2.0, sustain: 1.0, release: 3.0 })
    .filter({ 
        type: "lowpass", 
        cutoff: LFO.sine({ min: 600, max: 1800, speed: "8b" }) 
    })
    .pan(LFO.sine({ min: -0.5, max: 0.5, speed: "6b" }))
    .gain(0.35)
    .send(echoBus, 0.5);

// Plucks: Arpeggiated FM Electric Piano with Algorithmic Counterpoint
const plucks = Track("plucks")
    .synth("fm-epiano")
    .note([
        Parallel("C4", "G4", "B4", "E5"),
        Parallel("F3", "C4", "E4", "A4"),
        Parallel("A3", "E4", "G4", "C5"),
        Parallel("G3", "D4", "G4", "B4")
    ])
    .arp("upDown")
    .stepLength("1/16")
    .loopLength("4b")
    // Showcase .offset(): Overlays a delayed copy of the sequence pitched up an octave
    .offset("3/16", (e) => {
        if (typeof e.value === "string" && e.value !== "Tie") {
            const m = noteToMidi(e.value);
            if (m) e.value = midiToNote(m + 12);
        }
        return e;
    })
    .envelope({ attack: 0.01, decay: 0.15, sustain: 0.0, release: 0.2 })
    .filter({ type: "lowpass", cutoff: 3500 })
    .gain(0.3)
    .send(echoBus, 0.3);

// Data Stream: Fast, computer-like arpeggios using Diatonic Scale Mapping
const dataStream = Track("dataStream")
    .synth("soft-square")
    // Numeric degrees mapped to the C Major scale
    .note([
        0, 2, null, 7, 
        2, null, 7, 9, 
        4, 7, null, 11, 
        7, null, 11, 14
    ])
    .scale("C4", "major")
    .stepLength("1/16")
    // Showcase .mask(): Every 3rd active step is pitched up an octave (+7 scale degrees)
    .mask([false, false, true], (e) => {
        if (typeof e.value === "number") e.value += 7; 
        return e;
    })
    .envelope({ attack: 0.005, decay: 0.05, sustain: 0, release: 0.05 })
    .pan(LFO.triangle({ min: -0.8, max: 0.8, speed: "2b" }))
    .filter({ type: "lowpass", cutoff: LFO.sine({ min: 1000, max: 4000, speed: "4b" }) })
    .gain(0.18)
    .send(echoBus, 0.2);

// --- BASSLINES ---

function makeBassRhythm(note) {
    // Native JS arrays for clean, deterministic 16th-note syncopations
    return [
        note, note, null, note, 
        note, null, note, note, 
        note, note, null, note, 
        note, null, note, note
    ];
}
const bassPattern = [
    makeBassRhythm("C2"), // Bar 1
    makeBassRhythm("F1"), // Bar 2
    makeBassRhythm("A1"), // Bar 3
    makeBassRhythm("G1")  // Bar 4
];

// Clean sub-bass for most of the track
const bassClean = Track("bassClean")
    .synth("sub-bass")
    .note(bassPattern)
    .loopLength("4b")
    .envelope({ attack: 0.02, decay: 0.2, sustain: 0.1, release: 0.1 })
    .filter({ type: "lowpass", cutoff: 800 })
    .gain(0.85);

// Distorted bass reserved exclusively for the intense "Drive" section
const bassDrive = Track("bassDrive")
    .synth("synth-brass")
    .note(bassPattern)
    .loopLength("4b")
    .envelope({ attack: 0.01, decay: 0.2, sustain: 0.2, release: 0.15 })
    .filter({ 
        type: "lowpass", 
        cutoff: LFO.saw({ min: 400, max: 2200, speed: "2b" }), 
        resonance: 2.0 
    })
    .distort(0.25) // The sole use of distortion, explicitly contained
    .gain(0.55);

// --- DRUMS ---

// Crisp, breakbeat-style kick drum (Kick on 1 and 3.5)
const kick = Track("kick")
    .sample("kick-electronic")
    .note(["C3", null, null, null, null, "C3", null, null])
    .gain(0.9);

// Straight 4-on-the-floor kick for buildups
const kickFourOnFloor = Track("kickFourOnFloor")
    .sample("kick-electronic")
    .note(["C3", "C3", "C3", "C3"])
    .gain(0.9);

// Sharp electronic snare on the backbeats (2 and 4)
const snare = Track("snare")
    .sample("snare-electronic")
    .note([null, null, "C4", null, null, null, "C4", null])
    .filter({ type: "highpass", cutoff: 300 })
    .gain(0.75)
    .send(echoBus, 0.2);

// Extremely quiet ghost snares for groove
const ghostSnare = Track("ghostSnare")
    .sample("snare-electronic")
    .note([null, null, null, "C4", null, null, null, "C4"])
    .gain(0.15)
    .filter({ type: "highpass", cutoff: 1200 });

// Fast, deterministic Euclidean hi-hat pattern
const hihat = Track("hihat")
    .sample("hihat-closed")
    .euclid(11, 16) // 11 hits over 16 steps
    .gain(0.35)
    .pan(-0.25);

// Ride cymbal for high-energy sections
const ride = Track("ride")
    .sample("cymbal-ride")
    .note([null, null, "C4", null])
    .gain(0.5)
    .pan(0.3);

// Sidechain the basses and plucks to the primary kick
bassClean.sidechain(kick, { attack: 0.01, release: 0.1 });
bassDrive.sidechain(kick, { attack: 0.01, release: 0.1 });
plucks.sidechain(kick, { attack: 0.01, release: 0.1 });

// -----------------------------------------------------------------------------
// Macro Arrangement (96 Bars Total)
// -----------------------------------------------------------------------------
Arrange([
    // Phase 1: Awakening (Ambient Intro) - 8 bars
    { bars: 8, tracks: [bell] },
    
    // Phase 2: Powering Up (Add Drone Pad) - 8 bars
    { bars: 8, tracks: [bell, dronePad] },
    
    // Phase 3: First Steps (Add Clean Bass + Sparse Drums) - 8 bars
    { bars: 8, tracks: [bell, dronePad, bassClean, kick, snare] },
    
    // Phase 4: Discovery (Introduce Plucks counterpoint) - 8 bars
    { bars: 8, tracks: [bell, dronePad, bassClean, kick, snare, plucks] },
    
    // Phase 5: Momentum (Data Stream and Hi-Hats enter) - 8 bars
    { bars: 8, tracks: [bassClean, kick, snare, hihat, ghostSnare, plucks, dataStream] },
    
    // Phase 6: The "Drive" (Maximum Energy, Distorted Bass, Ride Cymbal) - 8 bars
    { bars: 8, tracks: [bassDrive, kick, snare, hihat, ghostSnare, ride, plucks, dataStream, dronePad] },
    
    // Phase 7: Suspension (Ambient Breakdown) - 8 bars
    { bars: 8, tracks: [bell, dronePad, dataStream] },
    
    // Phase 8: Initialization (4-on-the-floor Buildup) - 8 bars
    { bars: 8, tracks: [bell, dronePad, dataStream, kickFourOnFloor] },
    
    // Phase 9: Second Drop (Clean but Massive) - 8 bars
    { bars: 8, tracks: [bassClean, kick, snare, hihat, plucks, dronePad, bell] },
    
    // Phase 10: Climax (Add Data Stream & Ride) - 8 bars
    { bars: 8, tracks: [bassClean, kick, snare, hihat, ride, plucks, dronePad, bell, dataStream, ghostSnare] },
    
    // Phase 11: Wind Down (Fade out rhythm section) - 8 bars
    { bars: 8, tracks: [dronePad, bell, dataStream] },

    // Phase 12: Sleep (Final chord hold) - 8 bars
    { bars: 8, tracks: [dronePad] }
]);
</textarea>
        <!-- beautify ignore:end -->
        <!-- prettier-ignore-end -->
    </div>
</main>

<script src="../one.js"></script>
<script type="module">
    import {
        Motif, Track, Bus, Parallel, Ramp, LFO, Arrange, Tie,
        noteToMidi, midiToNote, degreeToMidi, midiToHz, SCALES, SimplexNoise,
        trackRegistry, busRegistry,
    } from "./motif.js";

    const DYNAMIC_SHOWCASE_COMPOSITION_NAME = "Samples & Synths (builtin)";
    const TITLE_COMMENT_REGEX = /^\/\/\s*Title:\s*(.+)$/m;

    const COMPOSITION_TEMPLATE = `// Motif Composition
//

Motif.setTempo(165);

Motif.master({
    gain: 0.85,
    limiter: true,
    eq: { low: 1.05, mid: 0.95, high: 1.10 },
});

Track("bell")
    .synth("ambient-bell")
    .note("C4");
`;

    // --- Motif Audio Engine Patches ---
    // Overwrite the default 1.0 second crossfade to make live coding updates
    // responsive and smooth in real-time.
    try {
        const dummyTrack = Track("__temp_probe__");
        const trackProto = Object.getPrototypeOf(dummyTrack);
        if (trackProto && typeof trackProto._crossfadeOut === "function") {
            const originalCrossfadeOut = trackProto._crossfadeOut;
            trackProto._crossfadeOut = function(newTrack, duration) {
                return originalCrossfadeOut.call(this, newTrack, 0.05);
            };
        }
    } catch (e) {
        console.warn("Failed to apply crossfade optimization:", e);
    }

    // --- DOM Selectors ---
    const codeEditor = document.getElementById("code-editor");
    const colorSelector = document.getElementById("color-selector");
    const consoleLogs = document.getElementById("console-logs");
    const logsPanel = document.getElementById("logs-panel");

    // --- Console/Logging System ---
    function logToConsole(message, type = "info") {
        if (!consoleLogs || !logsPanel) return;

        const classMap = {
            info: "log-info",
            success: "log-success",
            error: "log-error",
            warn: "log-warn",
            log: "log-default",
        };
        const prefixMap = {
            info: "[System]",
            success: "[Success]",
            error: "[Error]",
            warn: "[Warning]",
            log: "[Console]",
        };

        const span = document.createElement("span");
        span.className = classMap[type] || "log-info";
        span.textContent = `${prefixMap[type] || "[System]"} ${message}\n`;
        consoleLogs.appendChild(span);

        // Auto scroll to bottom
        logsPanel.scrollTop = logsPanel.scrollHeight;
    }

    // --- Global Console Redirection ---
    const originalConsole = {
        log: console.log,
        info: console.info,
        warn: console.warn,
        error: console.error,
    };

    function formatConsoleArgs(args) {
        if (args.length === 0) return "";
        const formatItem = (x) => {
            if (x instanceof Error) {
                return x.stack || `${x.name}: ${x.message}`;
            }
            return typeof x === "object" ? JSON.stringify(x) : String(x);
        };
        let first = args[0];
        if (typeof first === "string") {
            const styleCount = (first.match(/%c/g) || []).length;
            let cleanStr = first.replace(/%c/g, "");
            const remainingArgs = args.slice(1 + styleCount);
            if (remainingArgs.length > 0) {
                return cleanStr + " " + remainingArgs.map(formatItem).join(" ");
            }
            return cleanStr;
        }
        return args.map(formatItem).join(" ");
    }

    console.log = function(...args) {
        originalConsole.log(...args);
        logToConsole(formatConsoleArgs(args), "log");
    };

    console.info = function(...args) {
        originalConsole.info(...args);
        logToConsole(formatConsoleArgs(args), "info");
    };

    console.warn = function(...args) {
        originalConsole.warn(...args);
        logToConsole(formatConsoleArgs(args), "warn");
    };

    console.error = function(...args) {
        originalConsole.error(...args);
        logToConsole(formatConsoleArgs(args), "error");
    };

    // --- Theme Selection ---
    function applyThemeColor(color) {
        const themes = [...colorSelector.options].map(o => o.value).filter(Boolean);
        document.documentElement.classList.remove(...themes.map(t => "theme-" + t));
        if (color) {
            document.documentElement.classList.add("theme-" + color);
        }
    }

    colorSelector.addEventListener("change", (e) => {
        const color = e.target.value;
        applyThemeColor(color);
        saveSettings();
    });

    // --- Track Management & Persistence ---
    const defaultCode = codeEditor.value;

    const samplesList = Array.from(Motif.sampleRegistry.keys());
    const synthsList = Array.from(Motif.synthRegistry.keys());

    const generatedShowcaseCode = `// Motif Instrument Showcase
// Generated dynamically from active engine registries.
//
// Audits all samples, then all synths.
// For each instrument: logs name, plays note, and waits until it finishes.

const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

const showcaseTrack = Track("showcase")
    .gain(0.85);

async function runShowcase() {
    await sleep(200);

    const samples = ${JSON.stringify(samplesList, null, 8)};

    const synths = ${JSON.stringify(synthsList, null, 8)};

    // Play samples
    for (const sample of samples) {
        if (!Motif.isPlaying) return;

        console.log(\`[Sample] Playing: \${sample}\\n\`);
        showcaseTrack.sample(sample);
        await Promise.resolve();

        // Wait a short moment to guarantee the async buffer has loaded
        let retries = 0;
        while (!showcaseTrack._sampleBuffer && retries < 10) {
            await sleep(50);
            retries++;
        }

        const bufferDur = showcaseTrack._sampleBuffer ? showcaseTrack._sampleBuffer.duration : 1.2;
        const playDur = Math.max(bufferDur, 1.2);
        showcaseTrack._playEvent({ value: "C3" }, Motif.ctx.currentTime, playDur);
        await sleep(Math.ceil(playDur * 1000) + 300);
    }

    // Play synths
    for (const synth of synths) {
        if (!Motif.isPlaying) return;

        console.log(\`[Synth] Playing: \${synth}\\n\`);
        showcaseTrack.synth(synth);
        await Promise.resolve();
        const playDur = 1.5;
        showcaseTrack._playEvent({ value: "C4" }, Motif.ctx.currentTime, playDur);
        await sleep(2000);
    }

    console.log("[Showcase] Finished auditing all instruments.");
}

return runShowcase().then(() => "STOP_MOTIF");
`;

    const EXAMPLES = [
        { name: "chiptune_1.motif.js", path: "examples/chiptune_1.motif.js", datetime: "1970-01-01T00:00:00.090Z" },

        { name: "chiptune_2.motif.js", path: "examples/chiptune_2.motif.js", datetime: "1970-01-01T00:00:00.070Z" },
        { name: "soundscape.motif.js", path: "examples/soundscape.motif.js", datetime: "1970-01-01T00:00:00.060Z" },

    ];

    let compositions = [];
    let currentCompositionName = "Showcase (builtin)";

    const adjectives = ["Neon", "Retro", "Lunar", "Solar", "Aura", "Quantum", "Sonic", "Glitch", "Pulse", "Cyber", "Spectral", "Vapor"];
    const nouns = ["Drift", "Wave", "Beats", "Grid", "Forge", "Haze", "Nova", "Oasis", "Echo", "Flux", "Phase", "Sphere"];

    function generateRandomName() {
        const adj = adjectives[Math.floor(Math.random() * adjectives.length)];
        const noun = nouns[Math.floor(Math.random() * nouns.length)];
        let name = `${adj}-${noun}`;
        let suffix = 1;
        let uniqueName = name;
        while (compositions.some(c => c.name === uniqueName)) {
            uniqueName = `${name}-${suffix}`;
            suffix++;
        }
        return uniqueName;
    }

    async function saveCompositionsToStorage() {
        try {
            const customCompositions = compositions.filter(c => !c.isBuiltin).map(c => ({
                name: c.name,
                code: c.code,
                datetime: c.datetime
            }));
            await Storage.set("motif_custom_compositions", customCompositions);
            await Storage.set("motif_current_composition", currentCompositionName);
        } catch (e) {
            console.warn("Failed to save compositions to Storage:", e);
        }
    }

        try {
            const settings = {
                color: colorSelector.value,

            await Storage.set("motif_live_settings", settings);

            console.warn("Failed to save settings to Storage:", e);

    const downloadPresetBtn = document.getElementById("download-preset-btn");
    const presetDatetimeDisplay = document.getElementById("preset-datetime-display");

    function updatePresetSelect() {
        // Sort compositions by datetime descending
        compositions.sort((a, b) => new Date(b.datetime) - new Date(a.datetime));

        presetSelect.innerHTML = "";
        compositions.forEach(composition => {
            const option = document.createElement("option");
            option.value = composition.name;
            option.textContent = composition.name;
            presetSelect.appendChild(option);
        });
        const currentComposition = compositions.find(c => c.name === currentCompositionName);
        if (currentComposition) {
            presetSelect.value = currentComposition.name;
        }
    }

    function updateUI() {
        const currentComposition = compositions.find(c => c.name === currentCompositionName);
        if (!currentComposition) return;

        isDirty = false;
        if (!Motif.isPlaying && Motif.ctx) {
            Motif.stop();
            stopHudLoop();
        }

        if (codeEditor.value !== currentComposition.code) {
            codeEditor.value = currentComposition.code;
        }

        const isBuiltin = !!currentComposition.isBuiltin;
        deletePresetBtn.disabled = isBuiltin;
        editPresetBtn.disabled = isBuiltin;

        if (currentComposition.datetime && !isBuiltin) {
            const date = new Date(currentComposition.datetime);
            presetDatetimeDisplay.textContent = date.toISOString().replace('T', ' ').replace(/\..+/, '') + ' UTC';
        } else {
            presetDatetimeDisplay.textContent = "";
        }
    }

    async function loadPersistedState() {
        const fetchedExamples = [];
        await Promise.all(
            EXAMPLES.map(async (ex) => {
                try {
                    const response = await fetch(ex.path);
                    if (response.ok) {
                        const code = await response.text();
                        fetchedExamples.push({
                            name: ex.name,
                            code: code,
                            datetime: ex.datetime,
                            isBuiltin: true
                        });
                    }
                } catch (err) {
                    console.warn(`Failed to fetch example ${ex.name}:`, err);
                }
            })
        );

        try {
            const settings = await Storage.get("motif_live_settings");
            if (settings && settings.color !== undefined) {
                colorSelector.value = settings.color;
                applyThemeColor(settings.color);
            }

            let customCompositions = await Storage.get("motif_custom_compositions");
            if (!customCompositions) {
                customCompositions = await Storage.get("motif_custom_tracks") || [];
            }

            compositions = [
                {
                    name: "Showcase (builtin)",
                    code: defaultCode,
                    datetime: "1970-01-01T00:00:00.100Z",
                    isBuiltin: true
                },
                ...fetchedExamples,
                {
                    name: DYNAMIC_SHOWCASE_COMPOSITION_NAME,
                    code: generatedShowcaseCode,
                    datetime: "1970-01-01T00:00:00.010Z",
                    isBuiltin: true
                },
                ...customCompositions.map(c => ({ ...c, isBuiltin: false }))
            ];

            let savedCurrentComposition = await Storage.get("motif_current_composition");
            if (!savedCurrentComposition) {
                savedCurrentComposition = await Storage.get("motif_current_track") || "Showcase (builtin)";
            }

            if (compositions.some(c => c.name === savedCurrentComposition)) {
                currentCompositionName = savedCurrentComposition;
            } else {
                currentCompositionName = "Showcase (builtin)";
            }

            updatePresetSelect();
            updateUI();
        } catch (e) {
            console.warn("Failed to load persisted state from Storage:", e);
            compositions = [
                {
                    name: "Showcase (builtin)",
                    code: defaultCode,
                    datetime: "1970-01-01T00:00:00.100Z",
                    isBuiltin: true
                },
                ...fetchedExamples,
                {
                    name: DYNAMIC_SHOWCASE_COMPOSITION_NAME,
                    code: generatedShowcaseCode,
                    datetime: "1970-01-01T00:00:00.010Z",
                    isBuiltin: true
                }
            ];
            currentCompositionName = "Showcase (builtin)";
            updatePresetSelect();
            updateUI();
        }

            return;

        await Motif.stop();

            if (runUserCode()) {
                Motif.init();
                await Motif.ctx.resume();
                await Motif.start();
                playPauseBtn.textContent = "pause";
                playPauseBtn.setAttribute("data-tooltip", "Pause");
                startHudLoop();
            } else {
                playPauseBtn.textContent = "play_arrow";
                playPauseBtn.setAttribute("data-tooltip", "Play / Resume");
                stopHudLoop();
                updateHud();
            }
        } catch (err) {
            logToConsole(`Playback error: ${err.message}`, "error");
            playPauseBtn.textContent = "play_arrow";
            playPauseBtn.setAttribute("data-tooltip", "Play / Resume");
            stopHudLoop();
            updateHud();
        }
    }

    importFile.addEventListener("change", (e) => {

            try {

                if (!Array.isArray(imported)) {
                    one.alert("Invalid format. Expected a JSON array of compositions.");
                    return;
                }
                const valid = imported.every(c => c && typeof c.name === "string" && typeof c.code === "string");
                if (!valid) {
                    one.alert("Invalid composition format. Each composition must have a name and code.");
                    return;
                }

                if (await one.confirm(`Import ${imported.length} composition(s)? This will merge with or overwrite existing custom compositions with the same name.`)) {

                        const existingIdx = compositions.findIndex(c => c.name === newComp.name);

                            if (!compositions[existingIdx].isBuiltin) {
                                compositions[existingIdx] = {
                                    name: newComp.name,
                                    code: newComp.code,
                                    datetime: newComp.datetime || new Date().toISOString(),
                                    isBuiltin: false
                                };
                            }
                        } else {
                            compositions.push({

    // --- Motif Live Compiler ---
    function runUserCode(isHotReload = false) {
        const code = codeEditor.value;
        try {
            if (!isHotReload) {
                Track.clearRegistry();
                Bus.clearRegistry();
            }

            const declaredTrackIds = new Set();
            const declaredBusIds = new Set();

            const wrappedTrack = (id) => {
                if (id) declaredTrackIds.add(id);
                return Track(id);
            };
            wrappedTrack.clearRegistry = Track.clearRegistry;
            wrappedTrack.pruneExcept = Track.pruneExcept;

            const wrappedBus = (id) => {
                if (id) declaredBusIds.add(id);
                return Bus(id);
            };
            wrappedBus.clearRegistry = Bus.clearRegistry;
            wrappedBus.pruneExcept = Bus.pruneExcept;

            const AsyncFunction = Object.getPrototypeOf(async function() {
            }).constructor;
            const compileFn = new AsyncFunction(
                "Motif", "Track", "Bus", "Parallel", "Ramp", "LFO", "Arrange", "Tie",
                "noteToMidi", "midiToNote", "degreeToMidi", "midiToHz", "SCALES", "SimplexNoise",
                `"use strict";\n${code}`,
            );

            const resultPromise = compileFn(
                Motif, wrappedTrack, wrappedBus, Parallel, Ramp, LFO, Arrange, Tie,
                noteToMidi, midiToNote, degreeToMidi, midiToHz, SCALES, SimplexNoise,
            );

            resultPromise.then((returnValue) => {
                if (isHotReload) {
                    Track.pruneExcept(declaredTrackIds);
                    Bus.pruneExcept(declaredBusIds);
                }

                // If the script explicitly returns a special instruction to stop (for test suites)
                if (returnValue === "STOP_MOTIF") {
                    if (Motif.isPlaying) {
                        Motif.stop();
                        playPauseBtn.textContent = "play_arrow";
                        logToConsole("Playback auto-stopped by script.");
                    }
                }
            }).catch(err => {
                let errorMsg = `Async execution error: ${err.message}`;
                if (err.stack) {
                    const match = err.stack.match(/(?:<anonymous>|AsyncFunction|Function):(\d+):(\d+)/);
                    if (match) {
                        const lineNum = parseInt(match[1], 10) - 1;
                        if (lineNum > 0) {
                            errorMsg += ` (at line ${lineNum})`;
                        }
                    }
                }
                logToConsole(errorMsg, "error");
                if (err.stack) logToConsole(err.stack, "warn");
                console.error(err);
            });

            logToConsole(isHotReload ? "Live changes applied." : "Code compiled and applied successfully.", "success");
            return true;
        } catch (err) {
            let errorMsg = err.message;
            if (err.stack) {
                const match = err.stack.match(/(?:<anonymous>|AsyncFunction|Function):(\d+):(\d+)/);
                if (match) {
                    const lineNum = parseInt(match[1], 10) - 1;
                    if (lineNum > 0) {
                        errorMsg += ` (at line ${lineNum})`;
                    }
                }
            }
            logToConsole(errorMsg, "error");
            if (err.stack) logToConsole(err.stack, "warn");
            console.error(err);
            return false;
        }
    }

    // --- Playback Controls ---
    const playPauseBtn = document.getElementById("play-pause-btn");
    const restartBtn = document.getElementById("restart-btn");

    // Playback HUD Elements
    const playbackHud = document.getElementById("playback-hud");
    const playbackTime = document.getElementById("playback-time");
    const playbackSection = document.getElementById("playback-section");
    const playbackProgress = document.getElementById("playback-progress");
    const activeSynthsList = document.getElementById("active-synths-list");
    const activeSamplesList = document.getElementById("active-samples-list");

    let isDirty = false;
    let hudAnimationId = null;

    function formatTime(secs) {
        const m = Math.floor(secs / 60);
        const s = Math.floor(secs % 60);
        return `${m}:${s.toString().padStart(2, "0")}`;
    }

    function updateHud() {
        if (Motif.ctx && Motif._debugPlaybackStart !== null) {
            const elapsed = Motif.ctx.currentTime - Motif._debugPlaybackStart;

            // Calculate duration from Arrangement
            let totalDurationS = 0;
            let currentSectionName = "Looping Pattern";

            if (Motif._arrangementSections && Motif._arrangementSections.length > 0) {
                const bpm = Motif.tempo;
                const beatsPerBar = Motif.beatsPerBar;
                const barDuration = (60 / bpm) * beatsPerBar;

                let cumulativeTime = 0;
                let activeSecFound = false;

                for (let i = 0; i < Motif._arrangementSections.length; i++) {
                    const section = Motif._arrangementSections[i];
                    const sectionDuration = (section.bars || 0) * barDuration;

                    if (!activeSecFound && elapsed >= cumulativeTime && elapsed < cumulativeTime + sectionDuration) {
                        currentSectionName = `Phase ${i + 1}${section.name ? ': ' + section.name : ''}`;
                        activeSecFound = true;
                    }
                    cumulativeTime += sectionDuration;
                }
                totalDurationS = cumulativeTime;
            }

            // Beat / Bar calculation
            const bpm = Motif.tempo;
            const beatsPerBar = Motif.beatsPerBar;
            const beatDuration = 60 / bpm;
            const barDuration = beatDuration * beatsPerBar;
            const totalBeats = elapsed / beatDuration;
            const currentBar = Math.floor(totalBeats / beatsPerBar) + 1;
            const currentBeat = Math.floor(totalBeats % beatsPerBar) + 1;

            const totalBars = totalDurationS > 0 ? Math.round(totalDurationS / barDuration) : 0;

            // Update HUD text
            let timeStr = `Bar ${currentBar}`;
            if (totalBars > 0) timeStr += ` / ${totalBars}`;
            timeStr += ` (Beat ${currentBeat}) | Time: ${formatTime(elapsed)}`;
            if (totalDurationS > 0) timeStr += ` / ${formatTime(totalDurationS)}`;

            playbackTime.textContent = timeStr;
            playbackSection.textContent = totalDurationS > 0 ? `Section: ${currentSectionName}` : "";

            // Update progress bar
            if (totalDurationS > 0) {
                playbackProgress.max = totalDurationS;
                playbackProgress.value = Math.min(elapsed, totalDurationS);
            } else {
                playbackProgress.max = barDuration;
                playbackProgress.value = elapsed % barDuration;
            }

            // Update active instruments
            const now = Motif.ctx.currentTime;
            const activeSynths = new Set();
            const activeSamples = new Set();

            for (const track of trackRegistry.values()) {
                if (!track._activeVoices || track._activeVoices.size === 0) continue;
                for (const voice of track._activeVoices.values()) {
                    if (now >= voice.startTime && now < voice.endTime) {
                        if (track._useSample) {
                            const name = track._sampleUrl ? track._sampleUrl.split('/').pop().replace(/\.[^/.]+$/, "") : "sample";
                            activeSamples.add(name);
                        } else if (track._useSampler) {
                            activeSamples.add(track.id || "sampler");
                        } else if (track._synthType) {
                            activeSynths.add(track._synthType);
                        }
                    }
                }
            }

            activeSynthsList.innerHTML = activeSynths.size > 0 
                ? `Synths: ${[...activeSynths].join(", ")}` 
                : "";
            activeSamplesList.innerHTML = activeSamples.size > 0 
                ? `Samples: ${[...activeSamples].join(", ")}` 
                : "";
        } else {
            playbackTime.textContent = "Bar 1 | Time: 0:00";
            playbackSection.textContent = "";
            playbackProgress.value = 0;
            activeSynthsList.innerHTML = "";
            activeSamplesList.innerHTML = "";
        }

        if (Motif.isPlaying || (Motif._loadingSamples && Motif._loadingSamples.length > 0)) {
            hudAnimationId = requestAnimationFrame(updateHud);
        }
    }

    function startHudLoop() {
        playbackHud.removeAttribute("hidden");
        if (!hudAnimationId) {
            hudAnimationId = requestAnimationFrame(updateHud);
        }
    }

    function stopHudLoop() {
        if (hudAnimationId) {
            cancelAnimationFrame(hudAnimationId);
            hudAnimationId = null;
        }
        if (Motif._debugPlaybackStart === null) {
            playbackHud.setAttribute("hidden", "");
        }
    }

    async function togglePlayback() {
        try {
            Motif.init();
            await Motif.ctx.resume();

            if (Motif.isPlaying) {
                Motif.pause();
                playPauseBtn.textContent = "play_arrow";
                playPauseBtn.setAttribute("data-tooltip", "Play / Resume");
                logToConsole("Playback paused.");
                stopHudLoop();
                updateHud();
            } else {
                if (isDirty) {
                    await Motif.stop();
                    isDirty = false;
                    await Motif.ctx.resume();
                }
                
                if (Motif._debugPlaybackStart !== null) {
                    // Resume from pause without rebuilding/re-registering tracks
                    await Motif.start();
                    playPauseBtn.textContent = "pause";
                    playPauseBtn.setAttribute("data-tooltip", "Pause");
                    logToConsole("Playback resumed.");
                    startHudLoop();
                } else {
                    // Play from start
                    if (runUserCode()) {
                        await Motif.start();
                        playPauseBtn.textContent = "pause";
                        playPauseBtn.setAttribute("data-tooltip", "Pause");
                        logToConsole("Playback started.");
                        startHudLoop();
                    }
                }
            }
        } catch (err) {
            logToConsole(`Playback error: ${err.message}`, "error");
        }
    }

    async function restartPlayback() {
        try {
            Motif.init();
            await Motif.stop();
            isDirty = false;

            if (runUserCode()) {
                await Motif.ctx.resume();
                await Motif.start();
                playPauseBtn.textContent = "pause";
                playPauseBtn.setAttribute("data-tooltip", "Pause");
                logToConsole("Playback restarted.");
                startHudLoop();
            } else {
                playPauseBtn.textContent = "play_arrow";
                playPauseBtn.setAttribute("data-tooltip", "Play / Resume");
                stopHudLoop();
                updateHud();
            }
        } catch (err) {
            logToConsole(`Restart error: ${err.message}`, "error");
            playPauseBtn.textContent = "play_arrow";
            playPauseBtn.setAttribute("data-tooltip", "Play / Resume");
            stopHudLoop();
            updateHud();
        }
    }

    playPauseBtn.addEventListener("click", togglePlayback);
    restartBtn.addEventListener("click", restartPlayback);

    // --- Lossless Stereo WAV Recording Engine ---
    let recording = false;
    let recordBuffer = {
        sampleRate: 44100,
        channels: [[], []],
        length: 0,
    };
    let recorderNode = null;

    function startRecording() {
        if (!Motif.ctx) Motif.init();

        recordBuffer.sampleRate = Motif.ctx.sampleRate;
        recordBuffer.channels = [[], []];
        recordBuffer.length = 0;

        // Create stereo recorder script processor
        recorderNode = Motif.ctx.createScriptProcessor(4096, 2, 2);
        recorderNode.onaudioprocess = (e) => {
            if (!recording) return;
            const left = e.inputBuffer.getChannelData(0);
            const right = e.inputBuffer.getChannelData(1);

            // Push deep copies of float samples
            recordBuffer.channels[0].push(new Float32Array(left));
            recordBuffer.channels[1].push(new Float32Array(right));
            recordBuffer.length += left.length;
        };

        // Connect Motif's master output into recorder and then pass to destination
        Motif.masterGain.connect(recorderNode);
        recorderNode.connect(Motif.ctx.destination);

        recording = true;
        downloadBtn.textContent = "stop";
        downloadBtn.classList.add("recording");
        downloadBtn.setAttribute("data-tooltip", "Stop & Download WAV");
        logToConsole("Recording started. Adjust code or let it play to record output.", "success");
    }

    function stopRecordingAndDownload() {
        recording = false;

        if (recorderNode) {
            recorderNode.disconnect();
            recorderNode = null;
        }

        downloadBtn.textContent = "download";
        downloadBtn.classList.remove("recording");
        downloadBtn.setAttribute("data-tooltip", "Record & Download WAV");

        if (recordBuffer.length === 0) {
            logToConsole("No audio was recorded.", "error");
            return;
        }

        logToConsole(`Compiling WAV with ${recordBuffer.length} samples...`);

        // Flatten chunked buffers
        const flatChannels = [
            new Float32Array(recordBuffer.length),
            new Float32Array(recordBuffer.length),
        ];

        let offset = 0;
        for (let i = 0; i < recordBuffer.channels[0].length; i++) {
            const leftChunk = recordBuffer.channels[0][i];
            const rightChunk = recordBuffer.channels[1][i];
            flatChannels[0].set(leftChunk, offset);
            flatChannels[1].set(rightChunk, offset);
            offset += leftChunk.length;
        }

        const wavBlob = bufferToWav({
            sampleRate: recordBuffer.sampleRate,
            channels: flatChannels,
            length: recordBuffer.length,
        }, 2);

        const url = URL.createObjectURL(wavBlob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `motif-live-${Date.now()}.wav`;
        a.click();
        URL.revokeObjectURL(url);

        logToConsole("WAV recording saved and downloaded successfully.", "success");
    }

    // WAV Encoding standard helper
    function bufferToWav(buffer, numChannels = 2) {
        const sampleRate = buffer.sampleRate;
        const length = buffer.length * numChannels * 2 + 44;
        const bufferArr = new ArrayBuffer(length);
        const view = new DataView(bufferArr);

        function writeString(v, off, str) {
            for (let i = 0; i < str.length; i++) {
                v.setUint8(off + i, str.charCodeAt(i));
            }
        }

        writeString(view, 0, "RIFF");
        view.setUint32(4, length - 8, true);
        writeString(view, 8, "WAVE");
        writeString(view, 12, "fmt ");
        view.setUint32(16, 16, true);
        view.setUint16(20, 1, true); // PCM Format
        view.setUint16(22, numChannels, true);
        view.setUint32(24, sampleRate, true);
        view.setUint32(28, sampleRate * numChannels * 2, true);
        view.setUint16(32, numChannels * 2, true);
        view.setUint16(34, 16, true); // 16-bit
        writeString(view, 36, "data");
        view.setUint32(40, length - 44, true);

        let offset = 44;
        for (let i = 0; i < buffer.length; i++) {
            for (let ch = 0; ch < numChannels; ch++) {
                let sample = buffer.channels[ch][i];
                sample = Math.max(-1, Math.min(1, sample)); // Clamp
                const val = sample < 0 ? sample * 0x8000 : sample * 0x7FFF;
                view.setInt16(offset, val, true);
                offset += 2;
            }
        }

        return new Blob([view], { type: "audio/wav" });
    }

    async function handleDownloadClick() {
        try {
            Motif.init();
            await Motif.ctx.resume();

            if (recording) {
                stopRecordingAndDownload();
            } else {
                // Automatically play if not currently playing
                if (!Motif.isPlaying) {
                    if (runUserCode()) {
                        await Motif.start();
                        playPauseBtn.textContent = "stop";
                    } else {
                        return; // Don't record if code compilation failed
                    }
                }
                startRecording();
            }
        } catch (err) {
            logToConsole(`Recording error: ${err.message}`, "error");
        }
    }

    Motif.onPlaybackFinished = (info) => {
        const isLooping = info && info.looped;
        if (isLooping) {
            logToConsole("Arrangement loop completed. Repeating...");
        } else {
            playPauseBtn.textContent = "play_arrow";
            logToConsole("Playback finished.");
        }
        if (recording) {
            stopRecordingAndDownload();
        }
    };

    globalThis.startRecording = startRecording;
    globalThis.stopRecording = stopRecordingAndDownload;
    globalThis.stopRecordingAndDownload = stopRecordingAndDownload;

    downloadBtn.addEventListener("click", handleDownloadClick);
</script>
